name: Build & Release

# Triggers on version tags (e.g. v1.0.0) or manual dispatch from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needs write access to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false   # keep building other platforms even if one fails
      matrix:
        include:
          - os: windows-latest
            build_args: --win nsis portable
            artifact_pattern: release/Fox Blender Queue*.exe
          - os: macos-latest
            build_args: --mac dmg zip
            artifact_pattern: release/*.dmg
            artifact_pattern2: release/*.zip
          - os: ubuntu-latest
            build_args: --linux AppImage deb
            artifact_pattern: release/*.AppImage
            artifact_pattern2: release/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Sync package.json version to match the git tag (e.g. v1.2.3 → 1.2.3)
      # Falls back gracefully when triggered manually without a version tag
      - name: Sync version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            npm version "$TAG" --no-git-tag-version
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      # electron-builder has no portable-specific artifactName option,
      # so we rename it here to make "portable" explicit in the filename
      - name: Label portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $src = "release\Fox Blender Queue-$version-windows-x64.exe"
          $dst = "release\Fox Blender Queue-$version-windows-portable.exe"
          if (Test-Path $src) { Move-Item -Path $src -Destination $dst }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_pattern }}
            ${{ matrix.artifact_pattern2 }}
          draft: false
          prerelease: false
