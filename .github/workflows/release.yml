name: Build & Release

# Triggers on version tags (e.g. v1.0.0) or manual dispatch from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needs write access to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false   # keep building other platforms even if one fails
      matrix:
        include:
          - os: windows-latest
            build_args: --win nsis portable zip
            # "Fox Blender Queue*" naturally excludes elevate.exe and blockmap files
            artifact_pattern: release/Fox Blender Queue*.exe
            artifact_pattern2: release/Fox Blender Queue*.zip
          - os: macos-latest
            build_args: --mac dmg zip
            # Only Mac files are in release/ on a Mac runner — safe to use *.dmg / *.zip
            artifact_pattern: release/*.dmg
            artifact_pattern2: release/*.zip
          - os: ubuntu-latest
            build_args: --linux AppImage deb
            artifact_pattern: release/*.AppImage
            artifact_pattern2: release/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Package without publishing — artifacts are uploaded below
      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      # Upload only the relevant files to the GitHub Release, nothing else
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_pattern }}
            ${{ matrix.artifact_pattern2 }}
          draft: false
          prerelease: false
